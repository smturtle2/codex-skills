interface:
  display_name: "Animation Creator"
  short_description: "Create character animation assets"
  default_prompt: "Use $animation-creator to create character animation assets in the current session project from my source character image or from a generated base character prompt. Ask for the required animation action when missing, plan the action one concrete consecutive pose beat at a time before choosing frame count or layout, preserve frame-to-frame continuity in the exact build_generation_prompt.py stdout sent to $image-creator, attach the canonical base and registration guide to each action generation, keep the layout guide local for deterministic extraction, extract frames with hatch-pet-style component-first post-processing while preserving generated frame size, validate clipping, frame count, safe inset, and visual continuity, and produce project-local contact sheets, preview outputs, and final WebP animation files."
