interface:
  display_name: "Animation Creator"
  short_description: "Create character animation assets"
  default_prompt: "Use $animation-creator to create character animation assets in the current session project from my source character image or from a generated base character prompt. Ask for the required animation action when missing, plan the action one concrete consecutive pose beat at a time before choosing frame count or layout, audit the frame action list for missing transition beats and redundant duplicate beats, add or delete beats until the motion is continuous and readable, preserve frame-to-frame continuity in the exact build_generation_prompt.py stdout sent to $image-creator, attach the canonical base and registration guide as an edit template, generate an action sheet that keeps black cell borders and blue safe-area rectangles, removes dashed centerlines and faint guide characters, and fills only each inner safe area with chroma-key background and animation, extract frames with guide-canvas cleanup and required component-first post-processing while preserving generated frame size, validate clipping, frame count, safe inset, extraction method, and visual continuity, and produce project-local contact sheets, PNG frame sheets, and final WebP animation files."
