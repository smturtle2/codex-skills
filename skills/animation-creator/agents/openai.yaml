interface:
  display_name: "Animation Creator"
  short_description: "Create character animation assets"
  icon_small: "./assets/animation-creator-small.svg"
  icon_large: "./assets/animation-creator.png"
  default_prompt: "Use $animation-creator to create character animation assets in the current session project from my source character image or from a generated base character prompt. Ask for the required animation action when missing, plan the action one concrete consecutive pose beat at a time before choosing frame count or layout, audit the frame action list for missing transition beats and redundant duplicate beats, add or delete beats until the motion is continuous and readable, preserve frame-to-frame continuity in the exact build_generation_prompt.py stdout sent to $image-creator, preserve the canonical base as the identity reference, generate fixed 4x3 raw action sheets on one flat vivid sky-blue #00B7FF matte background reserved only for background pixels while preserving the outer black cell borders as registration marks, attach the canonical base and registration guide as an edit template, cut recorded action sheets into actual generated-size slots, strip outer borders before running rembg per slot through the uv project environment with GPU providers when available, extract frames through component-first post-processing while preserving generated frame size, validate clipping, frame count, extraction method, alpha transparency, and visual continuity, and produce project-local contact sheets, PNG frame sheets, and final WebP animation files."
